<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-body">

            <h4 class="mb-4">Upload File</h4>

            <div class="upload-box text-center p-5">

                <p>Kamu bisa langsung tarik filenya kesini yaa</p>

                <input type="file" class="form-control mt-3" multiple>

                <small class="text-muted d-block mt-2">
                    Maksimal file ukuran: 20MB
                </small>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="button" class="btn btn-primary" onclick="showEdutrackConfirm(
                    'Kumpulkan Tugas?', 
                    'Pastikan file yang diunggah sudah benar. Apakah kamu yakin ingin mengumpulkan sekarang?', 
                    'info', 
                    'Ya, Kumpulkan', 
                    function() {
                        // 1. Munculkan Pop-up Loading
                        Swal.fire({
                            title: 'Mengunggah File...',
                            html: 'Mohon tunggu sebentar, file sedang diproses.',
                            allowOutsideClick: false, /* Mencegah user menutup loading dengan klik di luar kotak */
                            showConfirmButton: false,
                            customClass: { 
                                popup: 'eureka-swal-popup', 
                                title: 'eureka-swal-title' 
                            },
                            didOpen: () => {
                                Swal.showLoading(); /* Memanggil animasi loading bawaan Swal */
                            }
                        });

                        // 2. Simulasi waktu upload menggunakan setTimeout (2500 ms = 2.5 detik)
                        setTimeout(() => {
                            
                            // 3. Munculkan Pop-up Berhasil setelah loading selesai
                            Swal.fire({ 
                                title: 'Berhasil!', 
                                text: 'Tugas berhasil dikumpulkan.', 
                                icon: 'success', 
                                customClass: { 
                                    popup: 'eureka-swal-popup', 
                                    title: 'eureka-swal-title', 
                                    confirmButton: 'eureka-btn-confirm' 
                                }, 
                                buttonsStyling: false 
                            }).then(() => {
                                // Kembali ke halaman tugas setelah klik OK
                                loadComponent('content-container', 'content/e-learning/matakuliah/tugas.html');
                            });

                        }, 2500); // Kamu bisa mengatur lama simulasi di sini (dalam milidetik)
                    }
                )">Simpan</button>
                <button type="button" class="btn btn-secondary" onclick="showEdutrackConfirm(
                    'Batal Upload?', 
                    'File yang sudah kamu pilih tidak akan disimpan. Yakin ingin kembali?', 
                    'warning', 
                    'Ya, Batal', 
                    function() {
                        loadComponent('content-container', 'content/e-learning/matakuliah/tugas.html');
                    }
                )">Batal</button>
            </div>

        </div>
    </div>

</div>
