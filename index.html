<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EDAN</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div id="auth">
        <div class="row g-0 h-100">

            <div class="col-lg-5 col-12">
                <div id="auth-left">
                    <div class="auth-logo">
                        <a href="index.html" style="text-decoration: none;">
                            <img src="assets/images/logo.jpg.png" alt="Logo UNIBI Eureka">
                        </a>
                    </div>
                    <h1 class="auth-title">Log in</h1>
                    <p class="auth-subtitle">Masukkan data Anda untuk mengakses platform pembelajaran.</p>

                    <form action="index.html" onsubmit="prosesLogin(event)">
                        <div class="form-group position-relative mb-4">
                            <input type="text" id="username" class="form-control" placeholder="Username / NIM">
                            <div class="form-control-icon">
                                <i class="bi bi-person"></i>
                            </div>
                        </div>

                        <div class="form-group position-relative mb-4">
                            <input type="password" id="password" class="form-control" placeholder="Password">
                            <div class="form-control-icon">
                                <i class="bi bi-shield-lock"></i>
                            </div>
                        </div>

                        <div class="form-check d-flex align-items-center mb-5">
                            <input class="form-check-input me-2" type="checkbox" value="" id="flexCheckDefault">
                            <label class="form-check-label" for="flexCheckDefault">
                                Ingatkan Saya
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Log in</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-7 d-none d-lg-block">
                <div id="auth-right" class="d-flex flex-column justify-content-center align-items-start p-5">
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function prosesLogin(event) {
            event.preventDefault(); 
            
            const inputAkun = document.getElementById('username').value;
            const inputPassword = document.getElementById('password').value;

            if (!inputAkun || !inputPassword) {
                Swal.fire({
                    icon: 'warning',
                    title: '<strong style="color: #333333;">Data Belum Lengkap</strong>',
                    html: '<span style="color: #555555;">Silakan masukkan Username/NIM dan Password Anda.</span>',
                    confirmButtonColor: '#58a4df',
                    background: '#ffffff',
                    color: '#333333'
                });
                return;
            }

            let timerInterval;
            Swal.fire({
                title: '<strong style="color: #58a4df;">Memeriksa Akun...</strong>',
                html: '<span style="color: #555555;">Mohon tunggu sebentar.</span>',
                timer: 1500,
                timerProgressBar: true,
                allowOutsideClick: false,
                background: '#ffffff',
                color: '#58a4df',
                didOpen: () => {
                    Swal.showLoading();
                },
                willClose: () => {
                    clearInterval(timerInterval);
                }
            }).then(() => {
                
                if (inputAkun === 'abcd1234' && inputPassword === '12345678') {
                    Swal.fire({
                        title: '<strong style="color: #333333;">Login Berhasil!</strong>',
                        html: '<span style="color: #555555;">Mengarahkan ke Dashboard Eureka...</span>',
                        icon: 'success',
                        timer: 1500, 
                        showConfirmButton: false,
                        background: '#ffffff',
                        color: '#333333'
                    }).then(() => {
                        window.location.href = 'index.html'; 
                    });
                } else {
                    Swal.fire({
                        title: '<strong style="color: #333333;">Login Gagal!</strong>',
                        html: '<span style="color: #555555;">Username/NIM atau Password yang Anda masukkan salah.</span>',
                        icon: 'error',
                        confirmButtonText: 'Coba Lagi',
                        confirmButtonColor: '#f27a71', 
                        background: '#ffffff',
                        color: '#333333'
                    });
                }
                
            });
        }
    </script>
</body>

</html>
